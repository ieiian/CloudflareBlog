services:
  mysql:
    image: mysql:8.4
    container_name: terminal-blog-mysql-test
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_CHANGE_ME_PASSWORD
      MYSQL_DATABASE: terminal_blog
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: CHANGE_ME_PASSWORD
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - terminal-blog-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  terminal-blog-mysql-data:
