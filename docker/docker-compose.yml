services:
  terminal-blog:
    image: ieiian/terminal-blog:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: terminal-blog
    ports:
      - "8788:8788"
    env_file:
      - ../.env
    volumes:
      # Optional: mount local Markdown files for `docker exec terminal-blog npm run import`
      - ../Markdown:/app/Markdown
      # Optional: reserved folder for download/export workflows
      - ../download:/app/download
    restart: unless-stopped
